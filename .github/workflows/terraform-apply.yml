name: Terraform Apply

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you trigger a manual apply without a push

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  TF_VERSION: "1.7.5"

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    # Tie this job to a GitHub Environment with required reviewers configured
    # (Settings -> Environments -> production -> Required reviewers). That
    # turns "push to main" into "push to main, then a human clicks approve"
    # for anything that touches real infrastructure.
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
